name: Create release

on:
  push:
    tags:
      - desktop-front-v*.*.*

permissions:
  contents: write

jobs:
  build: 
    uses: ./.github/workflows/build_desktop_app.yaml

  release:
    name: Release pushed tag
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Download executable artifact
        uses: actions/download-artifact@v8
        with:
          name: 'tauri.exe'
          path: target/release
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} -t ${{ github.ref_name }} -d -F CHANGELOG.md target/release/tauri.exe
