name: Build desktop app

on:
  push:
    branches:
      - main
  workflow_call:  
    outputs:
      artifact-name:
        description: "The name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}
    inputs:
      build-version:
        required: true
        type: string
        default: ""

env:
  APP_NAME: "tauri.exe"

permissions:
  contents: write

jobs:
  build:
    name: Build app
    runs-on: windows-latest
    outputs:
      artifact-name: ${{ steps.output-name.outputs.name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Install Rust
        run: rustup toolchain install

      - name: Cache rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build app
        run: npm run build
        
      - name: Add build version prefix to artifact
        if: ${{inputs.build-version != ''}}
        run: |
          mv target/release/${{ env.APP_NAME}} target/release/"${{inputs.build-version}}-${{env.APP_NAME}}"
          echo "APP_NAME=${{inputs.build-version}}-${{env.APP_NAME}}" >> $GITHUB_ENV

      - name: upload app
        uses: actions/upload-artifact@v7
        with:
          name: '${{env.APP_NAME}}'
          path: target/release/${{env.APP_NAME}}

      - id: output-name
        run: echo "name=${{env.APP_NAME}}" >> $GITHUB_OUTPUT
