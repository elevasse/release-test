name: Create release

on:
  push:
    tags:
      - desktop-v*.*.*

permissions:
  contents: write

jobs:
  get-version:
    runs-on: 'ubuntu-latest'
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    env:
      expected-tag-pattern: "^desktop-front-v"
    steps:
        # Get the tag version without the `desktop-front-` prefix.
      - id: get-version
        name: Get version
        run: |
          echo ${{github.ref_name}} | grep ${{env.expected-tag-pattern}} || { echo "No match found"; exit 1; }
          echo "version=`echo ${{github.ref_name}} | sed "s/${{env.expected-tag-pattern}}/v/g"`" >> $GITHUB_OUTPUT

  build: 
    uses: ./.github/workflows/build_desktop_app.yaml
    needs: get-version
    with:
      build-version: ${{ needs.get-version.outputs.version }}

  release:
    name: Release pushed tag
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Download executable artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{needs.build.outputs.artifact-name}}
          path: target/release
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} -t ${{ github.ref_name }} -d -F CHANGELOG.md target/release/${{needs.build.outputs.artifact-name}}
